  - "fraud"
  - "SEBI action"
  - "ED raid"
  - "promoter arrested"
  - "insolvency"
  - "default"
  - "trading halt"
  - "trading suspended"
  - "fund suspended"
  - "redemption suspended"
  - "circuit breaker"
  - "emergency announcement"
  - "promoter pledge increase"
  - "NCLT"
  - "liquidation"


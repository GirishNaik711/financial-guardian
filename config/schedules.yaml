# All APScheduler job definitions.
# Cron fields: hour and minute in IST.
# Interval fields: minutes.
# market_hours_only: true means the job is skipped outside 09:15–15:30 IST.

jobs:

  watchlist_sync:
    schedule: cron
    hour: 6
    minute: 45
    description: "Sync watchlist from Google Sheets before holdings sync"

  holdings_sync_morning:
    schedule: cron
    hour: 7
    minute: 0
    description: "Sync holdings from Kite and Groww before morning briefing"

  market_context_build:
    schedule: cron
    hour: 7
    minute: 15
    description: "Assemble market context object before morning briefing"

  morning_briefing:
    schedule: cron
    hour: 7
    minute: 30
    description: "Generate and send morning briefing to Slack"

  filings_poll:
    schedule: interval
    minutes: 15
    description: "Poll StockInsights for new BSE/NSE filings"
    market_hours_only: true

  nse_rss_poll:
    schedule: interval
    minutes: 30
    description: "Poll NSE RSS feeds for corporate announcements"
    market_hours_only: true

  alert_check:
    schedule: interval
    minutes: 15
    description: "Evaluate all alert trigger conditions"
    market_hours_only: true

  newsapi_poll:
    schedule: interval
    minutes: 120
    description: "Poll NewsAPI for breaking financial headlines"

  news_poll:
    schedule: interval
    minutes: 240
    description: "Query Perplexity for synthesised news with citations"

  eod_wrap:
    schedule: cron
    hour: 15
    minute: 35
    description: "Generate and send end-of-day wrap to Slack"

  holdings_sync_eod:
    schedule: cron
    hour: 16
    minute: 0
    description: "Sync holdings after market close"

  nav_fetch:
    schedule: cron
    hour: 21
    minute: 0
    description: "Fetch latest NAV from AMFI after 9 pm"

  health_check:
    schedule: interval
    minutes: 30
    description: "Verify all system components are operational"
name: Deploy to Home Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Install cloudflared on runner
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          cloudflared version

      - name: Configure SSH to route through Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config << 'EOF'
          Host ssh.vartamanai.com
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy to server
        run: |
          ssh -o "ConnectTimeout=30" \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            set -e

            PROJECT_DIR="/home/parashu/financial-guardian"
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            if [ -d ".git" ]; then
              git fetch origin main
              git reset --hard origin/main
            else
              git clone git@github.com:${{ github.repository }}.git .
            fi

            if [ ! -d "venv" ]; then
              python3.11 -m venv venv
            fi

            source venv/bin/activate
            pip install --upgrade pip --quiet
            pip install -r requirements.txt --quiet

            sudo systemctl reload-or-restart financial-guardian 2>/dev/null || true

            echo "Deploy complete: $(date)"
          ENDSSH

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed. Check logs."
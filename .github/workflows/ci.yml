name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create minimal .env for CI
        run: |
          cat > .env << 'EOF'
          APP_ENV=development
          APP_NAME=financial-guardian
          LOG_LEVEL=INFO
          TIMEZONE=Asia/Kolkata
          DATABASE_URL=postgresql://test:test@localhost:5432/test_guardian
          REDIS_URL=redis://localhost:6379/0
          KITE_API_KEY=ci_placeholder
          KITE_API_SECRET=ci_placeholder
          KITE_ACCESS_TOKEN=
          GROWW_AUTH_TOKEN=ci_placeholder
          WATCHLIST_SHEET_ID=ci_placeholder
          SLACK_BOT_TOKEN=xoxb-ci-placeholder
          SLACK_SIGNING_SECRET=ci_placeholder
          SLACK_CHANNEL_MORNING=C000000001
          SLACK_CHANNEL_EOD=C000000002
          SLACK_CHANNEL_ALERTS=C000000003
          PERPLEXITY_API_KEY=ci_placeholder
          STOCKINSIGHTS_API_KEY=ci_placeholder
          NEWSAPI_KEY=ci_placeholder
          ANTHROPIC_API_KEY=ci_placeholder
          GROWW_API_BASE_URL=https://groww.in/v1/api
          EOF

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --max-line-length=100 \
            --exclude=venv,__pycache__,.git \
            --statistics